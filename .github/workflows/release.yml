name: Release Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v, for example 0.3.0
        required: true
        default: 0.3.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  metadata:
    runs-on: ubuntu-latest

    outputs:
      release_version: ${{ steps.resolve.outputs.release_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      windows_package: ${{ steps.resolve.outputs.windows_package }}
      linux_deb: ${{ steps.resolve.outputs.linux_deb }}

    steps:
      - name: Resolve release version
        id: resolve
        shell: bash
        run: |
          version='${{ github.event.inputs.version }}'
          if [[ '${{ github.ref_type }}' != 'tag' || '${{ github.ref_name }}' != v* ]]; then
            echo 'Release workflow must run from a v* tag ref.' >&2
            exit 1
          fi
          tag_version='${{ github.ref_name }}'
          tag_version="${tag_version#v}"
          if [[ -z "$version" ]]; then
            version="$tag_version"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be major.minor.patch: $version" >&2
            exit 1
          fi
          if [[ "$version" != "$tag_version" ]]; then
            echo "Version input '$version' does not match tag version '$tag_version'." >&2
            exit 1
          fi
          {
            echo "release_version=$version"
            echo "release_tag=v$version"
            echo "windows_package=nvafx-audio-cli-v$version-windows-x64"
            echo "linux_deb=nvafx-audio-cli_${version}_amd64.deb"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    runs-on: windows-latest
    needs: metadata

    env:
      RELEASE_VERSION: ${{ needs.metadata.outputs.release_version }}
      PACKAGE_NAME: ${{ needs.metadata.outputs.windows_package }}

    steps:
      - name: Check out release ref
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Configure SDK-free release build
        run: cmake -S . -B build-release

      - name: Build SDK-free release executable
        run: cmake --build build-release --config Release

      - name: Run SDK-free tests
        run: ctest --test-dir build-release -C Release --output-on-failure

      - name: Repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Install WiX Toolset
        shell: pwsh
        run: dotnet tool install wix --tool-path .wix --version 5.0.2

      - name: Stage release payload
        shell: pwsh
        run: |
          $packageDir = Join-Path 'build-release-package' $env:PACKAGE_NAME
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item -LiteralPath 'build-release\Release\nvafx-audio-cli.exe' -Destination $packageDir
          Copy-Item -LiteralPath 'README.md' -Destination $packageDir
          Copy-Item -LiteralPath 'LICENSE' -Destination $packageDir
          Copy-Item -LiteralPath 'THIRD_PARTY_NOTICES.md' -Destination $packageDir
          @"
          nvafx-audio-cli v$env:RELEASE_VERSION
          Package: $env:PACKAGE_NAME

          Release tag target:
          $env:GITHUB_SHA

          Built executable:
          nvafx-audio-cli.exe

          Build mode:
          Windows x64 Release
          SDK-enabled build: no
          NVIDIA SDK runtime included: no
          NVIDIA models included: no
          NVIDIA DLLs included: no
          NVIDIA import libraries included: no
          NVIDIA headers included: no

          Important:
          This GitHub Actions-built binary is SDK-free. It supports CLI validation, WAV I/O guardrails, --dry-run, and --check-sdk, but actual NVIDIA AFX processing requires a local SDK-enabled build until a legal CI SDK setup exists.

          Required external runtime for SDK-enabled local processing:
          NVIDIA Audio Effects SDK installed locally by the user.

          Required runtime arguments for SDK-enabled processing:
          --runtime-root <path to NVIDIA Audio Effects SDK runtime>
          --model <path to .trtpkg model>

          Supported effects in SDK-enabled builds:
          denoiser
          dereverb
          dereverb_denoiser

          Supported sample rates:
          16000
          48000

          Pipe support:
          --input - reads WAV from stdin
          --output - writes 32-bit float WAV to stdout
          PowerShell 7.4+ or cmd.exe is recommended for binary WAV pipes.
          Do not use 2>&1 with --output -.

          MSI install behavior:
          The MSI adds its actual install directory to the machine PATH.
          Existing terminals may need to be reopened.
          Repair and reinstall keep exactly one PATH entry.
          Uninstall removes the PATH entry.
          NVIDIA SDK runtime and model paths are not added to PATH.
          "@ | Set-Content -Encoding utf8 -LiteralPath (Join-Path $packageDir 'BUILD_INFO.txt')

      - name: Build MSI
        shell: pwsh
        run: |
          .\packaging\msi\build-msi.ps1 `
            -InputDirectory (Join-Path 'build-release-package' $env:PACKAGE_NAME) `
            -OutputDirectory 'build-release-package' `
            -Version $env:RELEASE_VERSION `
            -Architecture x64 `
            -CustomActionDll 'build-release\Release\nvafx-msi-custom-actions.dll' `
            -WixPath '.\.wix\wix.exe'

      - name: Create zip package
        shell: pwsh
        run: |
          $packageDir = Join-Path 'build-release-package' $env:PACKAGE_NAME
          $zipPath = Join-Path 'build-release-package' "$env:PACKAGE_NAME.zip"
          Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Attest zip package
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build-release-package/${{ env.PACKAGE_NAME }}.zip

      - name: Attest MSI package
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build-release-package/${{ env.PACKAGE_NAME }}.msi

      - name: Attest executable
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build-release-package/${{ env.PACKAGE_NAME }}/nvafx-audio-cli.exe

      - name: Upload Windows assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            build-release-package/${{ env.PACKAGE_NAME }}.zip
            build-release-package/${{ env.PACKAGE_NAME }}.msi
            build-release-package/${{ env.PACKAGE_NAME }}/nvafx-audio-cli.exe
          if-no-files-found: error

  build-linux-deb:
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Check out release ref
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ninja-build ffmpeg dpkg-dev file

      - name: Configure SDK-free Debian package build
        run: cmake -S . -B build-linux -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build SDK-free Linux binary
        run: cmake --build build-linux

      - name: Run SDK-free tests
        run: ctest --test-dir build-linux --output-on-failure

      - name: Repository hygiene
        run: python3 scripts/check_repo_hygiene.py

      - name: Verify help
        run: ./build-linux/nvafx-audio-cli --help

      - name: Verify version
        run: ./build-linux/nvafx-audio-cli --version

      - name: Build Debian package
        run: cpack --config build-linux/CPackConfig.cmake -G DEB -B build-linux/package

      - name: Validate Debian package
        run: |
          deb="$(find build-linux/package -maxdepth 1 -type f -name '${{ needs.metadata.outputs.linux_deb }}' -print -quit)"
          test -n "$deb"
          dpkg-deb --field "$deb"
          dpkg-deb --contents "$deb"
          python3 scripts/check_deb_package.py "$deb"

      - name: Attest Debian package
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build-linux/package/${{ needs.metadata.outputs.linux_deb }}

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: build-linux/package/${{ needs.metadata.outputs.linux_deb }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-windows
      - build-linux-deb

    env:
      RELEASE_VERSION: ${{ needs.metadata.outputs.release_version }}
      RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
      PACKAGE_NAME: ${{ needs.metadata.outputs.windows_package }}
      LINUX_DEB: ${{ needs.metadata.outputs.linux_deb }}

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create checksums
        shell: bash
        run: |
          mkdir -p build-release-package
          zip="dist/windows-assets/$PACKAGE_NAME.zip"
          msi="dist/windows-assets/$PACKAGE_NAME.msi"
          exe="dist/windows-assets/$PACKAGE_NAME/nvafx-audio-cli.exe"
          deb="dist/linux-deb/$LINUX_DEB"
          sha256sum "$zip" "$msi" "$deb" "$exe" |
            sed -e "s#  $zip#  $PACKAGE_NAME.zip#" \
                -e "s#  $msi#  $PACKAGE_NAME.msi#" \
                -e "s#  $deb#  $LINUX_DEB#" \
                -e "s#  $exe#  nvafx-audio-cli.exe#" \
            > build-release-package/SHA256SUMS.txt
          cat build-release-package/SHA256SUMS.txt

      - name: Attest checksums
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build-release-package/SHA256SUMS.txt

      - name: Write release notes
        shell: bash
        run: |
          cat > build-release-package/RELEASE_NOTES.md <<EOF
          ## nvafx-audio-cli v$RELEASE_VERSION

          Windows-first offline WAV processing CLI for NVIDIA Audio Effects SDK.

          ### GitHub Actions-built assets

          This is a GitHub Actions-built and GitHub-attested release of nvafx-audio-cli.

          Download:

          - $PACKAGE_NAME.zip
          - $PACKAGE_NAME.msi
          - $LINUX_DEB
          - SHA256SUMS.txt

          ### Ubuntu/Debian package

          v$RELEASE_VERSION documents and ships the Linux SDK-enabled local source/helper workflow while keeping public GitHub Actions-built assets SDK-free.

          Manual install after download:

              sudo apt install ./$LINUX_DEB

          The .deb installs:

          - /usr/bin/nvafx-audio-cli
          - /usr/share/doc/nvafx-audio-cli/

          This package is SDK-free. It does not include NVIDIA SDK files, NVIDIA shared libraries, NVIDIA models, CUDA redistributables, generated media, sample media, credentials, or SDK acquisition logs. The Linux .deb cannot perform real NVIDIA processing.

          Real NVIDIA AFX processing requires a local SDK-enabled source build with user-provided NVIDIA SDK/runtime/model material. The source tree includes documentation and the scripts/build_linux_sdk_local.py helper for that local workflow.

          No SDK-enabled public binary or SDK-enabled public .deb is included in this release.

          APT repository publishing is not enabled in this release workflow. Production APT signing is managed outside this repository and is not used here.

          ### Provenance and verification

          Release artifacts are built by GitHub Actions from the public repository source and receive GitHub Artifact Attestations.

          This lets users verify that the distributed artifacts came from this repository, commit/tag, and workflow. It does not prove the code is harmless; it makes the source-to-artifact relationship inspectable.

          Example verification:

              gh attestation verify $PACKAGE_NAME.zip -R tsuchim/nvafx-audio-cli
              gh attestation verify $PACKAGE_NAME.msi -R tsuchim/nvafx-audio-cli
              gh attestation verify $LINUX_DEB -R tsuchim/nvafx-audio-cli

          ### Important SDK note

          GitHub-hosted runners do not include NVIDIA Audio Effects SDK and this workflow does not vendor, scrape, or download restricted NVIDIA SDK files.

          The GitHub Actions-built binaries are useful for CLI validation, WAV I/O guardrails, --dry-run, --check-sdk, and documentation/package structure. Actual NVIDIA AFX processing requires a local SDK-enabled build with user-provided SDK/runtime/model material.

          To process audio with a local SDK-enabled build, install NVIDIA Audio Effects SDK separately and pass:

          - --runtime-root <path to NVIDIA Audio Effects SDK runtime>
          - --model <path to .trtpkg model>

          ### MSI installer

          The MSI installs nvafx-audio-cli.exe and project documentation to C:\Program Files\nvafx-audio-cli.

          The MSI adds its actual install directory to the machine PATH. Existing terminals may need to be reopened before nvafx-audio-cli is found by command name. Repair and reinstall keep exactly one PATH entry. Uninstall removes the PATH entry.

          The MSI does not include or configure NVIDIA SDK runtime files, DLLs, models, headers, import libraries, redistributables, installers, generated media, or sample media. NVIDIA SDK runtime and model paths are not added to PATH; processing still requires --runtime-root and --model.

          ### Signing

          GitHub Artifact Attestation is included. Authenticode signing is not yet included.

          APT repository signing and publication are not performed by this workflow.

          MSIX is not produced for v$RELEASE_VERSION because production MSIX distribution requires trusted package signing.
          EOF

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            "dist/windows-assets/$PACKAGE_NAME.zip" \
            "dist/windows-assets/$PACKAGE_NAME.msi" \
            "dist/linux-deb/$LINUX_DEB" \
            "build-release-package/SHA256SUMS.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --title "nvafx-audio-cli v$RELEASE_VERSION" \
            --notes-file 'build-release-package/RELEASE_NOTES.md' \
            --target "$GITHUB_SHA" \
            --verify-tag
